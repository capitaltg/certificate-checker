name: Build Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU (cross-arch emulation)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: "thea-ui/package-lock.json"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
 
      - name: Build UI
        run: |
          cd thea-ui
          npm ci
          npm run ng build -- --aot --output-hashing all --build-optimizer --vendor-chunk
  
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "gradle"
  
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6
  
      - name: Assemble bootJar with bundled UI
        run: |
          mv thea-ui/dist/static thea-ui/static
          mv thea-ui/static thea-api/src/main/resources/
          cd thea-api
          ./gradlew bootjar --no-daemon

      # Build a single-arch (amd64) image locally so Trivy can scan it before we
      # publish anything. Layers are cached by the buildx builder and reused by
      # the multi-platform push below.
      - name: Build image (amd64) for scanning
        uses: docker/build-push-action@v7
        with:
          context: thea-api
          load: true
          tags: public.ecr.aws/capitaltg/thea:latest

      - name: Scan for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: public.ecr.aws/capitaltg/thea:latest
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "HIGH,CRITICAL"
          scanners: "vuln"
        env:
          TRIVY_OFFLINE_SCAN: true

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v7
        with:
          context: thea-api
          platforms: linux/amd64,linux/arm64
          push: true
          tags: public.ecr.aws/capitaltg/thea:latest
